<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyAlert</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />

    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- React, Babel, Axios -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fafafa;
            color: #111827;
        }

        #map {
            height: 100%;
            width: 100%;
        }

        .leaflet-container {
            font-family: Inter, sans-serif;
        }

        .leaflet-popup-content-wrapper {
            border-radius: 0.5rem;
        }

        .alert-scroll::-webkit-scrollbar {
            width: 4px;
        }

        .alert-scroll::-webkit-scrollbar-track {
            background: transparent;
        }

        .alert-scroll::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 4px;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const STATE_MAPPING = {
            "Alabama": "AL", "Alaska": "AK", "Arizona": "AZ", "Arkansas": "AR", "California": "CA",
            "Colorado": "CO", "Connecticut": "CT", "Delaware": "DE", "Florida": "FL", "Georgia": "GA",
            "Hawaii": "HI", "Idaho": "ID", "Illinois": "IL", "Indiana": "IN", "Iowa": "IA",
            "Kansas": "KS", "Kentucky": "KY", "Louisiana": "LA", "Maine": "ME", "Maryland": "MD",
            "Massachusetts": "MA", "Michigan": "MI", "Minnesota": "MN", "Mississippi": "MS", "Missouri": "MO",
            "Montana": "MT", "Nebraska": "NE", "Nevada": "NV", "New Hampshire": "NH", "New Jersey": "NJ",
            "New Mexico": "NM", "New York": "NY", "North Carolina": "NC", "North Dakota": "ND", "Ohio": "OH",
            "Oklahoma": "OK", "Oregon": "OR", "Pennsylvania": "PA", "Rhode Island": "RI", "South Carolina": "SC",
            "South Dakota": "SD", "Tennessee": "TN", "Texas": "TX", "Utah": "UT", "Vermont": "VT",
            "Virginia": "VA", "Washington": "WA", "West Virginia": "WV", "Wisconsin": "WI", "Wyoming": "WY",
            "District of Columbia": "DC", "Puerto Rico": "PR"
        };

        const getAlertIcon = (event) => {
            const e = (event || "").toLowerCase();
            if (e.includes("flood")) return "drop";
            if (e.includes("tornado")) return "wind";
            if (e.includes("wind") || e.includes("gale")) return "wind";
            if (e.includes("snow") || e.includes("winter") || e.includes("ice") || e.includes("blizzard") || e.includes("freeze") || e.includes("frost")) return "snowflake";
            if (e.includes("heat")) return "thermometer";
            if (e.includes("thunder") || e.includes("storm") || e.includes("squall")) return "lightning";
            if (e.includes("fire") || e.includes("red flag")) return "fire";
            if (e.includes("fog")) return "cloud-fog";
            if (e.includes("hurricane") || e.includes("tropical")) return "wind";
            return "warning";
        };

        // Generic event names that benefit from description-based re-titling
        const GENERIC_EVENTS = new Set([
            "special weather statement", "special statement",
            "administrative message", "public information statement",
            "hazardous weather outlook",
        ]);

        const parseAlertTitle = (event, description) => {
            if (!GENERIC_EVENTS.has((event || "").toLowerCase())) return event;
            const t = (description || "").toLowerCase();
            if (t.match(/wild\s*fire|fire weather|red flag|fire danger|brush fire|grass fire/)) return "Fire Weather Statement";
            if (t.match(/flash flood/)) return "Flash Flood Statement";
            if (t.match(/\bflood/)) return "Flood Statement";
            if (t.match(/tornado/)) return "Tornado Statement";
            if (t.match(/hurricane|tropical storm/)) return "Tropical Statement";
            if (t.match(/blizzard/)) return "Blizzard Statement";
            if (t.match(/winter storm/)) return "Winter Storm Statement";
            if (t.match(/snow|sleet|wintry|winter weather|freezing rain/)) return "Winter Weather Statement";
            if (t.match(/hard freeze|killing freeze|frost/)) return "Frost\/Freeze Statement";
            if (t.match(/\bice\b|icing/)) return "Ice Statement";
            if (t.match(/excessive heat|extreme heat/)) return "Excessive Heat Statement";
            if (t.match(/\bheat\b/)) return "Heat Statement";
            if (t.match(/dense fog/)) return "Dense Fog Statement";
            if (t.match(/\bfog\b/)) return "Fog Statement";
            if (t.match(/high wind|severe wind|damaging wind|strong wind/)) return "High Wind Statement";
            if (t.match(/gusty wind|\bwind\b/)) return "Wind Statement";
            if (t.match(/severe thunderstorm/)) return "Severe Thunderstorm Statement";
            if (t.match(/thunderstorm/)) return "Thunderstorm Statement";
            if (t.match(/rip current/)) return "Rip Current Statement";
            if (t.match(/drought/)) return "Drought Statement";
            if (t.match(/air quality|smoke/)) return "Air Quality Statement";
            if (t.match(/surf|coastal/)) return "Coastal Statement";
            return event;
        };

        // Returns color classes for border, icon background, and icon text
        const getAlertColors = (event) => {
            const e = (event || "").toLowerCase();
            if (e.match(/tornado warning|severe thunderstorm warning|flash flood (warning|emergency)|extreme wind warning|hurricane warning/))
                return { border: 'border-red-500', iconBg: 'bg-red-100', iconText: 'text-red-600' };
            if (e.match(/tornado watch|severe thunderstorm watch|flash flood watch/))
                return { border: 'border-orange-500', iconBg: 'bg-orange-100', iconText: 'text-orange-600' };
            if (e.match(/fire|red flag/))
                return { border: 'border-orange-500', iconBg: 'bg-orange-100', iconText: 'text-orange-600' };
            if (e.match(/blizzard|winter storm warning|ice storm/))
                return { border: 'border-blue-500', iconBg: 'bg-blue-100', iconText: 'text-blue-600' };
            if (e.match(/winter|snow|sleet|frost|freeze|ice/))
                return { border: 'border-blue-400', iconBg: 'bg-blue-50', iconText: 'text-blue-500' };
            if (e.match(/flash flood/))
                return { border: 'border-red-400', iconBg: 'bg-red-50', iconText: 'text-red-500' };
            if (e.match(/flood/))
                return { border: 'border-cyan-500', iconBg: 'bg-cyan-100', iconText: 'text-cyan-600' };
            if (e.match(/excessive heat|extreme heat/))
                return { border: 'border-red-400', iconBg: 'bg-red-50', iconText: 'text-red-500' };
            if (e.match(/heat/))
                return { border: 'border-orange-400', iconBg: 'bg-orange-50', iconText: 'text-orange-500' };
            if (e.match(/high wind|wind warning|wind advisory/))
                return { border: 'border-amber-500', iconBg: 'bg-amber-100', iconText: 'text-amber-600' };
            if (e.match(/thunderstorm|tornado|squall/))
                return { border: 'border-amber-400', iconBg: 'bg-amber-50', iconText: 'text-amber-600' };
            if (e.match(/fog/))
                return { border: 'border-slate-400', iconBg: 'bg-slate-100', iconText: 'text-slate-500' };
            if (e.match(/warning/))
                return { border: 'border-yellow-400', iconBg: 'bg-yellow-50', iconText: 'text-yellow-600' };
            if (e.match(/watch/))
                return { border: 'border-yellow-300', iconBg: 'bg-yellow-50', iconText: 'text-yellow-500' };
            if (e.match(/advisory/))
                return { border: 'border-sky-400', iconBg: 'bg-sky-50', iconText: 'text-sky-500' };
            return { border: 'border-slate-300', iconBg: 'bg-slate-100', iconText: 'text-slate-500' };
        };

        const getWeatherIcon = (code) => {
            if (code === 0) return "sun";
            if (code <= 3) return "cloud-sun";
            if (code <= 48) return "cloud-fog";
            if (code <= 67) return "cloud-rain";
            if (code <= 77) return "snowflake";
            if (code <= 82) return "cloud-rain";
            return "lightning";
        };

        const getUVLabel = (uv) => {
            if (uv <= 2) return "Low";
            if (uv <= 5) return "Moderate";
            if (uv <= 7) return "High";
            if (uv <= 10) return "V. High";
            return "Extreme";
        };

        const timeAgo = (iso) => {
            const diff = Date.now() - new Date(iso).getTime();
            const m = Math.floor(diff / 60000);
            if (m < 60) return `${m}m ago`;
            const h = Math.floor(m / 60);
            if (h < 24) return `${h}h ago`;
            return `${Math.floor(h / 24)}d ago`;
        };

        const fmtTime = (iso) => new Date(iso).toLocaleString([], {
            weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
        });

        const getAffectedAreas = (alert) => (alert.properties?.areaDesc || "")
            .split(';')
            .map(area => area.trim())
            .filter(Boolean);

        const getAlertZoneGeometries = async (alert, zoneGeometryCacheRef) => {
            if (alert.geometry || !alert.properties.affectedZones?.length) return [];
            const zoneUrls = alert.properties.affectedZones.slice(0, 80);
            const geometries = await Promise.all(zoneUrls.map(async (url) => {
                if (!zoneGeometryCacheRef.current[url]) {
                    zoneGeometryCacheRef.current[url] = axios.get(url, {
                        headers: { Accept: 'application/geo+json' }
                    })
                        .then(res => res.data?.geometry || null)
                        .catch(() => null);
                }
                return zoneGeometryCacheRef.current[url];
            }));
            return geometries.filter(Boolean);
        };

        const enrichAlertsWithZoneGeometries = async (alerts, zoneGeometryCacheRef) => Promise.all(
            alerts.map(async (alert) => {
                const zoneGeometries = await getAlertZoneGeometries(alert, zoneGeometryCacheRef);
                return zoneGeometries.length ? { ...alert, zoneGeometries } : alert;
            })
        );

        // ── Alert Card ────────────────────────────────────────────────────────
        const AlertCard = ({ alert }) => {
            const [expanded, setExpanded] = useState(false);
            const { event, description } = alert.properties;
            const title = parseAlertTitle(event, description);
            const icon = getAlertIcon(title);
            const colors = getAlertColors(title);
            const affectedAreas = getAffectedAreas(alert);
            return (
                <div className={`border-l-4 ${colors.border} bg-white p-4 rounded-r-md border-y border-r border-gray-200 shadow-sm`}>
                    <div className="flex justify-between items-start mb-2">
                        <h4 className="font-semibold text-gray-900 flex items-center gap-2">
                            <i className={`ph-fill ph-${icon} ${colors.iconText}`}></i>
                            {title}
                        </h4>
                    </div>
                    <p className="text-sm text-gray-700 mb-3 leading-relaxed"
                        style={{ display: '-webkit-box', WebkitLineClamp: expanded ? 'unset' : 3, WebkitBoxOrient: 'vertical', overflow: 'hidden' }}>
                        {alert.properties.headline || alert.properties.description || "No description available."}
                    </p>
                    <div className="text-xs text-gray-500 flex items-center gap-4 flex-wrap">
                        <span className="flex items-center gap-1">
                            <i className="ph ph-clock"></i> Issued: {fmtTime(alert.properties.effective)}
                        </span>
                        <span className={`flex items-center gap-1 font-medium ${colors.iconText}`}>
                            <i className="ph ph-hourglass"></i> Expires: {fmtTime(alert.properties.expires)}
                        </span>
                    </div>
                    {expanded && (
                        <div className="mt-3 p-3 bg-gray-50 rounded-md border border-gray-200 max-h-64 overflow-y-auto text-xs text-gray-600 leading-relaxed">
                            {affectedAreas.length > 0 && (
                                <div className="mb-3 pb-3 border-b border-gray-200">
                                    <div className="font-semibold text-gray-800 mb-1">Affected counties/areas</div>
                                    <div className="flex flex-wrap gap-1.5">
                                        {affectedAreas.map((area, i) => (
                                            <span key={`${area}-${i}`} className="px-2 py-1 bg-white border border-gray-200 rounded text-gray-700">
                                                {area}
                                            </span>
                                        ))}
                                    </div>
                                </div>
                            )}
                            <div className="whitespace-pre-wrap">
                                {alert.properties.description || "No description available."}
                            </div>
                        </div>
                    )}
                    <button
                        onClick={() => setExpanded(!expanded)}
                        className="mt-2 text-xs text-gray-500 hover:text-gray-800 font-medium transition-colors">
                        {expanded ? "Hide details" : "View details"}
                    </button>
                </div>
            );
        };

        // ── Alerts Panel (tabbed) ────────────────────────────────────────────
        const AlertsPanel = ({ location, localActive, statewideActive, localRecent, statewideRecent, loading }) => {
            const [activeTab, setActiveTab] = useState(0);
            const tabs = [
                { label: "Current County", alerts: localActive },
                { label: "Current State", alerts: statewideActive },
                { label: "Past County", alerts: localRecent },
                { label: "Past State", alerts: statewideRecent },
            ];
            const current = tabs[activeTab];
            return (
                <section className="bg-white border border-gray-200 rounded-xl flex flex-col overflow-hidden shadow-sm">
                    <div className="px-6 py-4 border-b border-gray-200 bg-white">
                        <h2 className="text-xl font-semibold tracking-tight">Weather Alerts</h2>
                        {location.countyName && (
                            <p className="text-sm text-gray-500 font-medium mt-1">
                                {location.countyName} &bull; {location.stateName}
                            </p>
                        )}
                    </div>
                    <div className="flex overflow-x-auto border-b border-gray-200 bg-gray-50 text-sm whitespace-nowrap">
                        {tabs.map((tab, i) => (
                            <button key={i} onClick={() => setActiveTab(i)}
                                className={`px-5 py-3 transition-colors ${i === activeTab
                                    ? 'font-semibold text-gray-900 border-b-2 border-gray-900 bg-white'
                                    : 'font-medium text-gray-500 hover:text-gray-700 hover:bg-gray-100'}`}>
                                {tab.label} ({loading ? '…' : tab.alerts.length})
                            </button>
                        ))}
                    </div>
                    <div className="p-4 flex flex-col gap-3 overflow-y-auto max-h-[400px] alert-scroll bg-gray-50/50">
                        {loading ? (
                            <div className="flex items-center justify-center gap-3 py-8 text-gray-500">
                                <div className="animate-spin rounded-full h-6 w-6 border-t-2 border-b-2 border-gray-400"></div>
                                <p className="text-sm">Accessing NWS database…</p>
                            </div>
                        ) : current.alerts.length === 0 ? (
                            <div className="flex items-center justify-center gap-3 py-8 text-gray-500">
                                <i className="ph-fill ph-check-circle text-emerald-500 text-xl"></i>
                                <p className="text-sm italic">No alerts in this category.</p>
                            </div>
                        ) : (
                            current.alerts.map(a => <AlertCard key={a.id} alert={a} />)
                        )}
                    </div>
                </section>
            );
        };

        // ── Weather Section ──────────────────────────────────────────────────
        const StatBox = ({ icon, label, value }) => (
            <div className="p-3 bg-gray-50 rounded-lg">
                <div className="flex items-center gap-2 text-gray-500 mb-1">
                    <i className={`ph ph-${icon}`}></i>
                    <span className="text-[10px] uppercase tracking-wider font-semibold">{label}</span>
                </div>
                <div className="text-base font-medium">{value}</div>
            </div>
        );

        const WeatherSection = ({ weather, forecast }) => (
            <section className="grid grid-cols-1 lg:grid-cols-3 gap-8 items-center bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
                <div className="flex items-center justify-center lg:justify-start gap-6 lg:border-r border-gray-200 lg:pr-8">
                    {weather ? (
                        <>
                            <span className="text-7xl font-light tracking-tighter">{Math.round(weather.temperature_2m)}&deg;</span>
                            <div className="flex flex-col text-gray-500">
                                <i className={`ph ph-${getWeatherIcon(weather.weather_code)} text-4xl mb-1 text-gray-700`}></i>
                                <span className="text-sm font-medium">Current</span>
                            </div>
                        </>
                    ) : (
                        <div className="flex items-center gap-3 text-gray-400">
                            <div className="animate-spin rounded-full h-6 w-6 border-t-2 border-gray-300"></div>
                            <span className="text-sm">Loading…</span>
                        </div>
                    )}
                </div>
                <div className="grid grid-cols-2 gap-4 lg:px-4">
                    {weather ? (
                        <>
                            <StatBox icon="thermometer" label="Feels Like" value={`${Math.round(weather.apparent_temperature)}°`} />
                            <StatBox icon="drop" label="Humidity" value={`${weather.relative_humidity_2m}%`} />
                            <StatBox icon="wind" label="Wind" value={`${Math.round(weather.wind_speed_10m)} mph`} />
                            <StatBox icon="sun-dim" label="UV Index" value={`${Math.round(weather.uv_index)} · ${getUVLabel(weather.uv_index)}`} />
                        </>
                    ) : (
                        <div className="col-span-2 py-4 text-center text-gray-400 text-sm">Loading weather…</div>
                    )}
                </div>
                <div className="flex flex-col gap-2 lg:border-l border-gray-200 lg:pl-8">
                    <h3 className="text-[11px] uppercase tracking-wider font-bold text-gray-500 pb-1">48-Hour Forecast</h3>
                    {forecast.length > 0 ? forecast.map((day, i) => (
                        <div key={i} className="flex items-center justify-between p-2 hover:bg-gray-50 rounded-md transition-colors text-sm">
                            <span className="w-20 font-medium">{day.label}</span>
                            <i className="ph ph-cloud-sun text-lg text-gray-500"></i>
                            <div className="flex gap-3">
                                <span className="font-semibold text-gray-900">{day.high}&deg;</span>
                                <span className="text-gray-400">{day.low}&deg;</span>
                            </div>
                        </div>
                    )) : (
                        <div className="text-sm text-gray-400 italic">Loading forecast…</div>
                    )}
                </div>
            </section>
        );

        // ── Main App ──────────────────────────────────────────────────────────
        const App = () => {
            const [location, setLocation] = useState({ lat: null, lon: null, stateCode: null, stateName: null, countyName: null });
            const [alertsLoading, setAlertsLoading] = useState(true);
            const [error, setError] = useState(null);
            const [localActiveAlerts, setLocalActiveAlerts] = useState([]);
            const [statewideActiveAlerts, setStatewideActiveAlerts] = useState([]);
            const [localRecentAlerts, setLocalRecentAlerts] = useState([]);
            const [statewideRecentAlerts, setStatewideRecentAlerts] = useState([]);
            const [weather, setWeather] = useState(null);
            const [forecast, setForecast] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            const [searchResults, setSearchResults] = useState([]);
            const [searchLoading, setSearchLoading] = useState(false);

            const mapRef = useRef(null);
            const mapInstanceRef = useRef(null);
            const layerGroupRef = useRef(null);
            const userMarkerRef = useRef(null);
            const zoneGeometryCacheRef = useRef({});

            const categorizeAlerts = (alerts, countyName) => {
                let local = [], statewide = [];
                if (countyName) {
                    const uc = countyName.toLowerCase();
                    alerts.forEach(alert => {
                        const areas = (alert.properties.areaDesc || "").toLowerCase().split(';').map(s => s.trim());
                        if (areas.some(a => a === uc || a.includes(uc))) local.push(alert);
                        else statewide.push(alert);
                    });
                } else {
                    statewide = alerts;
                }
                return { local, statewide };
            };

            // Shared: reverse-geocode coords and load all data for that location
            const loadFromCoords = async (latitude, longitude) => {
                try {
                    const geoRes = await axios.get(`https://nominatim.openstreetmap.org/reverse`, {
                        params: { format: 'json', lat: latitude, lon: longitude }
                    });
                    const address = geoRes.data.address;
                    const stateName = address.state;
                    const stateCode = STATE_MAPPING[stateName];
                    const countyName = (address.county || "").replace(/\s+(County|Parish|Borough)$/i, "");
                    if (!stateCode) throw new Error(`Unknown state: ${stateName}`);

                    setAlertsLoading(true);
                    setWeather(null);
                    setForecast([]);

                    const locData = { lat: latitude, lon: longitude, stateCode, stateName, countyName };
                    setLocation(locData);

                    // Cache the fully resolved location
                    localStorage.setItem('skyalert_location', JSON.stringify(locData));
                } catch (err) {
                    setError("Failed to determine location. " + err.message);
                    setAlertsLoading(false);
                }
            };

            // 1. Geolocation + reverse geocode
            useEffect(() => {
                const cachedLocation = localStorage.getItem('skyalert_location');

                if (cachedLocation) {
                    try {
                        setLocation(JSON.parse(cachedLocation));
                        return; // Exit early to prevent redundant geolocation prompt
                    } catch (e) {
                        console.error("Cache parsing failed, falling back to geolocation.");
                        localStorage.removeItem('skyalert_location');
                    }
                }

                if (!navigator.geolocation) {
                    setError("Geolocation is not supported by your browser.");
                    setAlertsLoading(false);
                    return;
                }

                navigator.geolocation.getCurrentPosition(
                    (pos) => loadFromCoords(pos.coords.latitude, pos.coords.longitude),
                    () => {
                        setError("Location access denied. Please allow location access and reload.");
                        setAlertsLoading(false);
                    }
                );
            }, []);

            // Search: debounced Nominatim query
            useEffect(() => {
                if (!searchQuery.trim()) { setSearchResults([]); setSearchLoading(false); return; }
                setSearchLoading(true);
                const timer = setTimeout(async () => {
                    try {
                        const res = await axios.get(`https://nominatim.openstreetmap.org/search`, {
                            params: { q: searchQuery, format: 'json', addressdetails: 1, limit: 6, countrycodes: 'us' }
                        });
                        setSearchResults(res.data);
                    } catch {
                        setSearchResults([]);
                    } finally {
                        setSearchLoading(false);
                    }
                }, 400);
                return () => clearTimeout(timer);
            }, [searchQuery]);

            // 2. NWS Alerts
            useEffect(() => {
                if (!location.stateCode) return;
                let cancelled = false;
                const fetchAlerts = async () => {
                    try {
                        const startTime = new Date(Date.now() - 6 * 24 * 60 * 60 * 1000).toISOString().split('.')[0] + "Z";
                        const [activeRes, historyRes] = await Promise.all([
                            axios.get(`https://api.weather.gov/alerts/active`, {
                                headers: { Accept: 'application/geo+json' },
                                params: { area: location.stateCode }
                            }),
                            axios.get(`https://api.weather.gov/alerts`, {
                                headers: { Accept: 'application/geo+json' },
                                params: { area: location.stateCode, start: startTime, limit: 200 }
                            })
                        ]);
                        const active = activeRes.data.features || [];
                        const history = historyRes.data.features || [];
                        const activeIds = new Set(active.map(a => a.id));
                        const recent = history.filter(a => !activeIds.has(a.id));
                        const ca = categorizeAlerts(active, location.countyName);
                        const cr = categorizeAlerts(recent, location.countyName);
                        if (cancelled) return;
                        setLocalActiveAlerts(ca.local);
                        setStatewideActiveAlerts(ca.statewide);
                        setLocalRecentAlerts(cr.local);
                        setStatewideRecentAlerts(cr.statewide);
                        setAlertsLoading(false);

                        const [activeWithZoneGeometries, recentWithZoneGeometries] = await Promise.all([
                            enrichAlertsWithZoneGeometries(active, zoneGeometryCacheRef),
                            enrichAlertsWithZoneGeometries(recent, zoneGeometryCacheRef)
                        ]);
                        const enrichedActive = categorizeAlerts(activeWithZoneGeometries, location.countyName);
                        const enrichedRecent = categorizeAlerts(recentWithZoneGeometries, location.countyName);
                        if (cancelled) return;
                        setLocalActiveAlerts(enrichedActive.local);
                        setStatewideActiveAlerts(enrichedActive.statewide);
                        setLocalRecentAlerts(enrichedRecent.local);
                        setStatewideRecentAlerts(enrichedRecent.statewide);
                    } catch (err) {
                        if (cancelled) return;
                        let msg = "Failed to fetch weather alerts.";
                        if (err.response?.data?.detail) msg += `: ${err.response.data.detail}`;
                        else if (err.response?.data?.title) msg += `: ${err.response.data.title}`;
                        else msg += ` ${err.message}`;
                        setError(msg);
                        setAlertsLoading(false);
                    }
                };
                fetchAlerts();
                return () => { cancelled = true; };
            }, [location.stateCode, location.countyName]);

            // 3. Open-Meteo current weather + 48h forecast
            useEffect(() => {
                if (!location.lat) return;
                const fetchWeather = async () => {
                    try {
                        const res = await axios.get(`https://api.open-meteo.com/v1/forecast`, {
                            params: {
                                latitude: location.lat,
                                longitude: location.lon,
                                current: "temperature_2m,apparent_temperature,relative_humidity_2m,surface_pressure,uv_index,visibility,weather_code,wind_speed_10m",
                                hourly: "temperature_2m",
                                temperature_unit: "fahrenheit",
                                wind_speed_unit: "mph",
                                forecast_days: 3,
                                timezone: "auto"
                            }
                        });
                        setWeather(res.data.current);
                        // Build per-day high/low for next 2 days
                        const { time: times, temperature_2m: temps } = res.data.hourly;
                        const today = new Date().toISOString().split('T')[0];
                        const dayMap = {};
                        times.forEach((t, i) => {
                            const d = t.split('T')[0];
                            if (d <= today) return;
                            if (!dayMap[d]) dayMap[d] = [];
                            dayMap[d].push(temps[i]);
                        });
                        const days = Object.keys(dayMap).sort().slice(0, 2);
                        setForecast(days.map(d => ({
                            label: new Date(d + 'T12:00:00').toLocaleDateString([], { weekday: 'short' }),
                            high: Math.round(Math.max(...dayMap[d])),
                            low: Math.round(Math.min(...dayMap[d])),
                        })));
                    } catch (err) {
                        console.error("Open-Meteo fetch failed:", err);
                    }
                };
                fetchWeather();
            }, [location.lat, location.lon]);

            // 4. Init Leaflet map
            useEffect(() => {
                if (!location.lat || !mapRef.current || mapInstanceRef.current) return;
                mapInstanceRef.current = L.map(mapRef.current, { zoomControl: false })
                    .setView([location.lat, location.lon], 8);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>'
                }).addTo(mapInstanceRef.current);
                L.control.zoom({ position: 'bottomright' }).addTo(mapInstanceRef.current);
                const markerHtml = `<div style="width:14px;height:14px;background:#374151;border-radius:50%;border:3px solid white;box-shadow:0 0 8px rgba(0,0,0,0.3);"></div>`;
                const icon = L.divIcon({ html: markerHtml, className: '', iconSize: [14, 14], iconAnchor: [7, 7] });
                userMarkerRef.current = L.marker([location.lat, location.lon], { icon })
                    .addTo(mapInstanceRef.current).bindPopup("You are here").openPopup();
                layerGroupRef.current = L.layerGroup().addTo(mapInstanceRef.current);
            }, [location.lat]);

            // 4b. Pan map and reposition marker when location changes (e.g. after search)
            useEffect(() => {
                if (!mapInstanceRef.current || !location.lat) return;
                mapInstanceRef.current.setView([location.lat, location.lon], 8);
                if (userMarkerRef.current) {
                    userMarkerRef.current.setLatLng([location.lat, location.lon]);
                }
            }, [location.lat, location.lon]);

            // 5. Draw alert polygons
            useEffect(() => {
                if (!mapInstanceRef.current || !layerGroupRef.current) return;
                layerGroupRef.current.clearLayers();
                const add = (alerts, color, weight) => alerts.forEach(alert => {
                    const geometries = alert.geometry ? [alert.geometry] : (alert.zoneGeometries || []);
                    geometries.forEach(geometry => {
                        L.geoJSON(geometry, {
                            style: { color, weight, opacity: 0.8, fillOpacity: 0.1 },
                            onEachFeature: (f, layer) => layer.bindPopup(`<b>${alert.properties.event}</b><br>${alert.properties.headline || ''}`)
                        }).addTo(layerGroupRef.current);
                    });
                });
                add(statewideRecentAlerts, '#94a3b8', 1);
                add(localRecentAlerts, '#64748b', 2);
                add(statewideActiveAlerts, '#0099f0', 2);
                add(localActiveAlerts, '#005f98', 4);
            }, [localActiveAlerts, statewideActiveAlerts, localRecentAlerts, statewideRecentAlerts]);

            const totalActive = localActiveAlerts.length + statewideActiveAlerts.length;

            if (error) {
                return (
                    <div className="flex items-center justify-center min-h-screen p-4">
                        <div className="bg-white border border-red-200 p-8 rounded-xl shadow-lg text-center max-w-md">
                            <i className="ph-fill ph-x-circle text-red-500 text-5xl mb-3 block"></i>
                            <h2 className="text-xl font-semibold text-gray-900 mb-3">Unable to Load</h2>
                            <p className="text-gray-600 mb-6 text-sm">{error}</p>
                            <button onClick={() => window.location.reload()}
                                className="px-6 py-2.5 bg-gray-900 text-white rounded-md font-medium hover:bg-gray-700 transition-colors">
                                Retry
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <>
                    {/* ── Header ── */}
                    <header className="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-200">
                        <div className="max-w-6xl mx-auto px-6 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-2">
                                <i className="ph-fill ph-warning-octagon text-red-500 text-2xl"></i>
                                <h1 className="text-xl font-semibold tracking-tight">SkyAlert</h1>
                            </div>
                            <div className="flex items-center gap-2 w-full sm:w-auto">
                                <div className="relative w-full sm:w-64">
                                    <i className="ph ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none"></i>
                                    {searchLoading && (
                                        <div className="absolute right-3 top-1/2 -translate-y-1/2">
                                            <div className="animate-spin rounded-full h-4 w-4 border-t-2 border-gray-400"></div>
                                        </div>
                                    )}
                                    <input
                                        type="text"
                                        value={searchQuery}
                                        onChange={e => setSearchQuery(e.target.value)}
                                        onKeyDown={e => e.key === 'Escape' && setSearchQuery('')}
                                        onBlur={() => setTimeout(() => setSearchResults([]), 150)}
                                        placeholder="Search city, county, or zip..."
                                        className="w-full pl-9 pr-4 py-2 bg-gray-100 border-none rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-gray-300 transition-shadow"
                                    />
                                    {searchQuery && searchResults.length > 0 && (
                                        <div className="absolute top-full left-0 right-0 mt-1 bg-white rounded-md border border-gray-200 shadow-lg z-50 overflow-hidden">
                                            {searchResults.map((r, i) => {
                                                const city = r.address?.city || r.address?.town || r.address?.village || r.address?.county || '';
                                                const state = r.address?.state || '';
                                                const label = city ? `${city}, ${state}` : r.display_name.split(',').slice(0, 2).join(',');
                                                return (
                                                    <button key={i}
                                                        onClick={async () => {
                                                            setSearchQuery('');
                                                            setSearchResults([]);
                                                            await loadFromCoords(parseFloat(r.lat), parseFloat(r.lon));
                                                        }}
                                                        className="w-full flex items-center gap-2 px-4 py-2.5 hover:bg-gray-50 text-left border-b border-gray-100 last:border-0 text-sm">
                                                        <i className="ph ph-map-pin text-gray-400 flex-shrink-0"></i>
                                                        <div className="min-w-0">
                                                            <p className="font-medium text-gray-800">{label}</p>
                                                            <p className="text-xs text-gray-500 truncate">{r.display_name}</p>
                                                        </div>
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    )}
                                </div>
                                <button
                                    title="Use Current Location"
                                    onClick={() => {
                                        if (navigator.geolocation) {
                                            navigator.geolocation.getCurrentPosition(
                                                pos => loadFromCoords(pos.coords.latitude, pos.coords.longitude),
                                                () => { }
                                            );
                                        }
                                    }}
                                    className="p-2 bg-gray-100 hover:bg-gray-200 text-gray-600 rounded-md transition-colors flex-shrink-0">
                                    <i className="ph ph-crosshair text-lg"></i>
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="flex-grow max-w-6xl mx-auto w-full px-6 py-8 flex flex-col gap-10">

                        {/* ── Map ── */}
                        <section className="relative w-full h-[400px] bg-gray-200 rounded-xl overflow-hidden border border-gray-200 shadow-sm z-10">
                            <div className="absolute inset-0 z-0" ref={mapRef} id="map"></div>

                            {/* Active alert badge */}
                            {totalActive > 0 && (
                                <div className="absolute top-4 left-4 z-20 bg-white/90 px-3 py-1.5 rounded-full shadow text-xs font-bold text-red-600 border border-red-100 flex items-center gap-1.5">
                                    <span className="w-1.5 h-1.5 bg-red-500 rounded-full animate-pulse"></span>
                                    {totalActive} Active Alert{totalActive > 1 ? 's' : ''}
                                </div>
                            )}

                            {/* Legend */}
                            <div className="absolute top-4 right-4 z-[400] bg-white p-2 rounded shadow text-xs font-medium border border-gray-200">
                                <div className="flex items-center gap-2 mb-1"><div className="w-3 h-3 rounded-full bg-[#005f98]"></div> Local Active</div>
                                <div className="flex items-center gap-2 mb-1"><div className="w-3 h-3 rounded-full bg-[#0099f0]"></div> State Active</div>
                                <div className="flex items-center gap-2"><div className="w-3 h-3 rounded-full bg-[#94a3b8]"></div> Recent</div>
                            </div>

                            {/* Location label */}
                            {location.countyName && (
                                <div className="absolute bottom-4 left-4 z-20 bg-white/90 px-3 py-2 rounded-md shadow text-xs font-medium border border-gray-200">
                                    {location.countyName} County, {location.stateName}
                                </div>
                            )}
                        </section>

                        {/* ── Alerts Panel ── */}
                        <AlertsPanel
                            location={location}
                            localActive={localActiveAlerts}
                            statewideActive={statewideActiveAlerts}
                            localRecent={localRecentAlerts}
                            statewideRecent={statewideRecentAlerts}
                            loading={alertsLoading}
                        />

                        {/* ── Weather Section ── */}
                        <WeatherSection weather={weather} forecast={forecast} />

                    </main>

                    {/* ── Footer ── */}
                    <footer className="bg-white border-t border-gray-200 mt-auto">
                        <div className="max-w-6xl mx-auto px-6 py-6 flex flex-col md:flex-row justify-between items-center gap-4 text-xs text-gray-500">
                            <p>Data provided by <a href="https://www.weather.gov" className="underline hover:text-gray-900">NWS API</a> and <a href="https://open-meteo.com" className="underline hover:text-gray-900">Open-Meteo</a>.</p>
                            <div className="flex gap-4">
                                <a href="https://github.com/boonewr/WeatherAlerts" className="hover:text-gray-900 transition-colors">GitHub</a>
                            </div>
                        </div>
                    </footer>
                </>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
