<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>State Weather Alerts</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Axios -->
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <style>
        #map { height: 400px; width: 100%; border-radius: 0.5rem; z-index: 0; }
        .leaflet-popup-content-wrapper { border-radius: 0.5rem; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // State Name to Abbreviation Mapping
        const STATE_MAPPING = {
            "Alabama": "AL", "Alaska": "AK", "Arizona": "AZ", "Arkansas": "AR", "California": "CA",
            "Colorado": "CO", "Connecticut": "CT", "Delaware": "DE", "Florida": "FL", "Georgia": "GA",
            "Hawaii": "HI", "Idaho": "ID", "Illinois": "IL", "Indiana": "IN", "Iowa": "IA",
            "Kansas": "KS", "Kentucky": "KY", "Louisiana": "LA", "Maine": "ME", "Maryland": "MD",
            "Massachusetts": "MA", "Michigan": "MI", "Minnesota": "MN", "Mississippi": "MS", "Missouri": "MO",
            "Montana": "MT", "Nebraska": "NE", "Nevada": "NV", "New Hampshire": "NH", "New Jersey": "NJ",
            "New Mexico": "NM", "New York": "NY", "North Carolina": "NC", "North Dakota": "ND", "Ohio": "OH",
            "Oklahoma": "OK", "Oregon": "OR", "Pennsylvania": "PA", "Rhode Island": "RI", "South Carolina": "SC",
            "South Dakota": "SD", "Tennessee": "TN", "Texas": "TX", "Utah": "UT", "Vermont": "VT",
            "Virginia": "VA", "Washington": "WA", "West Virginia": "WV", "Wisconsin": "WI", "Wyoming": "WY",
            "District of Columbia": "DC", "Puerto Rico": "PR"
        };

        const AlertCard = ({ alert, type }) => {
            const isActive = type === 'active';
            const borderClass = isActive ? 'border-l-4 border-red-500' : 'border-l-4 border-gray-400';
            const bgClass = isActive ? 'bg-white' : 'bg-gray-50 opacity-75';

            const formatTime = (isoString) => {
                return new Date(isoString).toLocaleString([], { 
                    weekday: 'short', hour: '2-digit', minute: '2-digit', month: 'short', day: 'numeric' 
                });
            };

            return (
                <div className={`p-4 mb-3 rounded shadow-sm ${bgClass} ${borderClass}`}>
                    <div className="flex justify-between items-start mb-1">
                        <h3 className="font-bold text-lg leading-tight text-slate-800">{alert.properties.event}</h3>
                        {isActive && <span className="text-xs font-bold px-2 py-1 bg-red-100 text-red-800 rounded-full">Active</span>}
                    </div>
                    <p className="text-xs text-slate-500 font-mono mb-2">{alert.properties.areaDesc}</p>
                    <div className="text-sm text-slate-700 space-y-1">
                        <p><span className="font-semibold text-slate-600">Effective:</span> {formatTime(alert.properties.effective)}</p>
                        <p><span className="font-semibold text-slate-600">Expires:</span> {formatTime(alert.properties.expires)}</p>
                    </div>
                    <details className="mt-2 text-sm text-slate-600 cursor-pointer">
                        <summary className="hover:text-blue-600 focus:outline-none">Show Description</summary>
                        <div className="mt-2 p-2 bg-slate-100 rounded text-xs whitespace-pre-wrap font-mono max-h-40 overflow-y-auto">
                            {alert.properties.description || "No description available."}
                        </div>
                    </details>
                </div>
            );
        };

        const CollapsibleSection = ({ title, count, children, isOpenDefault = false, color = "slate", icon }) => {
            const [isOpen, setIsOpen] = useState(isOpenDefault);
            
            const colorClasses = {
                red: "bg-red-50 border-red-200 text-red-800",
                slate: "bg-slate-50 border-slate-200 text-slate-800",
                gray: "bg-gray-50 border-gray-200 text-gray-800",
            };

            return (
                <div className={`border rounded-lg overflow-hidden mb-4 ${colorClasses[color] || colorClasses.slate}`}>
                    <button 
                        onClick={() => setIsOpen(!isOpen)} 
                        className="w-full px-4 py-3 flex items-center justify-between text-left focus:outline-none hover:bg-black/5 transition-colors"
                    >
                        <div className="flex items-center gap-3 font-bold text-lg">
                            {icon}
                            <span>{title}</span>
                            <span className="text-xs px-2 py-0.5 rounded-full bg-white/50 border border-black/10 font-mono">
                                {count}
                            </span>
                        </div>
                        <svg 
                            xmlns="http://www.w3.org/2000/svg" 
                            className={`w-5 h-5 transition-transform duration-200 ${isOpen ? 'rotate-180' : ''}`} 
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
                        >
                            <polyline points="6 9 12 15 18 9"></polyline>
                        </svg>
                    </button>
                    
                    {isOpen && (
                        <div className="p-4 border-t border-black/5 bg-white/50 space-y-3">
                            {count > 0 ? children : <p className="text-sm italic opacity-60">No alerts found in this category.</p>}
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [location, setLocation] = useState({ lat: null, lon: null, stateCode: null, stateName: null, countyName: null });
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            
            // Alert Buckets
            const [localActiveAlerts, setLocalActiveAlerts] = useState([]);
            const [statewideActiveAlerts, setStatewideActiveAlerts] = useState([]);
            const [localRecentAlerts, setLocalRecentAlerts] = useState([]);
            const [statewideRecentAlerts, setStatewideRecentAlerts] = useState([]);
            
            const mapRef = useRef(null);
            const mapInstanceRef = useRef(null);
            const layerGroupRef = useRef(null);

            // Helper: Categorize alerts into Local vs Statewide
            const categorizeAlerts = (alerts, countyName) => {
                let local = [];
                let statewide = [];

                if (countyName) {
                    const userCounty = countyName.toLowerCase();
                    alerts.forEach(alert => {
                        const areaDesc = (alert.properties.areaDesc || "").toLowerCase();
                        const areas = areaDesc.split(';').map(s => s.trim());
                        if (areas.some(area => area === userCounty || area.includes(userCounty))) {
                            local.push(alert);
                        } else {
                            statewide.push(alert);
                        }
                    });
                } else {
                    statewide = alerts;
                }
                return { local, statewide };
            };

            // 1. Get Geolocation & State
            useEffect(() => {
                if (!navigator.geolocation) {
                    setError("Geolocation is not supported by your browser.");
                    setLoading(false);
                    return;
                }

                navigator.geolocation.getCurrentPosition(
                    async (position) => {
                        const { latitude, longitude } = position.coords;
                        try {
                            // Reverse Geocode to get State & County
                            const geoRes = await axios.get(`https://nominatim.openstreetmap.org/reverse`, {
                                params: { format: 'json', lat: latitude, lon: longitude }
                            });
                            
                            const address = geoRes.data.address;
                            const stateName = address.state;
                            const stateCode = STATE_MAPPING[stateName];
                            
                            // Extract County (Nominatim usually returns "Travis County", we want "Travis" for better matching)
                            let countyRaw = address.county || "";
                            // Remove common suffixes to match NWS "areaDesc" style (e.g. "Travis County" -> "Travis")
                            const countyName = countyRaw.replace(/\s+(County|Parish|Borough)$/i, "");

                            if (!stateCode) {
                                throw new Error(`Could not determine state code for: ${stateName}`);
                            }

                            setLocation({ lat: latitude, lon: longitude, stateCode, stateName, countyName });
                        } catch (err) {
                            console.error(err);
                            setError("Failed to determine your state location. " + err.message);
                            setLoading(false);
                        }
                    },
                    (err) => {
                        setError("Unable to retrieve your location. Please allow location access.");
                        setLoading(false);
                    }
                );
            }, []);

            // 2. Fetch Weather Alerts once State is known
            useEffect(() => {
                if (!location.stateCode) return;

                const fetchAlerts = async () => {
                    try {
                        const now = new Date();
                        const sevenDaysAgo = new Date(now.getTime() - (6 * 24 * 60 * 60 * 1000)); // 6 days to be safe
                        
                        // Format: YYYY-MM-DDThh:mm:ssZ (No milliseconds)
                        const startTime = sevenDaysAgo.toISOString().split('.')[0] + "Z";
                        console.log("Requesting alerts since:", startTime);

                        const config = {
                            headers: { 'Accept': 'application/geo+json' },
                            // Active endpoint often rejects 'limit' or extra params. 
                            // It returns ALL active alerts for the area by default.
                            params: { area: location.stateCode } 
                        };

                        // Fetch Active
                        const activePromise = axios.get(`https://api.weather.gov/alerts/active`, config);

                        // Fetch History
                        // Note: The history endpoint is simply /alerts
                        const historyConfig = {
                            headers: { 'Accept': 'application/geo+json' },
                            params: { 
                                area: location.stateCode, 
                                start: startTime,
                                limit: 200 
                            }
                        };
                        const historyPromise = axios.get(`https://api.weather.gov/alerts`, historyConfig);

                        const [activeRes, historyRes] = await Promise.all([activePromise, historyPromise]);

                        const active = activeRes.data.features || [];
                        const history = historyRes.data.features || [];

                        // Filter Recent: Remove items that are currently active from history list
                        const activeIds = new Set(active.map(a => a.id));
                        const recent = history.filter(a => !activeIds.has(a.id));

                        // Split Alerts: Local vs Statewide
                        const categorizedActive = categorizeAlerts(active, location.countyName);
                        const categorizedRecent = categorizeAlerts(recent, location.countyName);

                        setLocalActiveAlerts(categorizedActive.local);
                        setStatewideActiveAlerts(categorizedActive.statewide);
                        setLocalRecentAlerts(categorizedRecent.local);
                        setStatewideRecentAlerts(categorizedRecent.statewide);
                        
                        setLoading(false);

                    } catch (err) {
                        console.error("API Error details:", err);
                        let msg = "Failed to fetch weather alerts.";
                        if (err.response) {
                            console.log("Error Response Data:", err.response.data);
                            msg += ` (Status: ${err.response.status})`;
                            if (err.response.data && err.response.data.detail) {
                                msg += `: ${err.response.data.detail}`;
                            } else if (err.response.data && err.response.data.title) {
                                msg += `: ${err.response.data.title}`;
                            }
                        } else if (err.request) {
                            msg += " No response received from NWS API.";
                        } else {
                            msg += ` ${err.message}`;
                        }
                        setError(msg);
                        setLoading(false);
                    }
                };

                fetchAlerts();
            }, [location.stateCode, location.countyName]);

            // 3. Initialize & Update Map
            useEffect(() => {
                if (!location.lat || !mapRef.current) return;

                // Init Map if not exists
                if (!mapInstanceRef.current) {
                    mapInstanceRef.current = L.map(mapRef.current).setView([location.lat, location.lon], 8); // Zoomed in a bit more
                    
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
                    }).addTo(mapInstanceRef.current);

                    // Add user marker
                    L.marker([location.lat, location.lon]).addTo(mapInstanceRef.current)
                        .bindPopup("You are here").openPopup();
                    
                    layerGroupRef.current = L.layerGroup().addTo(mapInstanceRef.current);
                }
            }, [location.lat]);

            // 4. Draw Alert Polygons
            useEffect(() => {
                if (!mapInstanceRef.current || !layerGroupRef.current) return;
                
                // Clear existing layers
                layerGroupRef.current.clearLayers();

                // Helper to add polygons
                const addAlertsToMap = (alerts, color, weight = 2) => {
                    alerts.forEach(alert => {
                        if (alert.geometry) {
                            L.geoJSON(alert.geometry, {
                                style: { color: color, weight: weight, opacity: 0.6, fillOpacity: 0.2 },
                                onEachFeature: (feature, layer) => {
                                    layer.bindPopup(`<b>${alert.properties.event}</b><br>${alert.properties.headline}`);
                                }
                            }).addTo(layerGroupRef.current);
                        }
                    });
                };

                // Draw order matters (bottom layers first)
                addAlertsToMap(statewideRecentAlerts, '#9ca3af', 1); // Gray-400 (Light Gray)
                addAlertsToMap(localRecentAlerts, '#4b5563', 2);     // Gray-600 (Dark Gray)
                addAlertsToMap(statewideActiveAlerts, '#ef4444', 2); // Red-500
                addAlertsToMap(localActiveAlerts, '#b91c1c', 4);     // Red-700 (Thick)

            }, [localActiveAlerts, statewideActiveAlerts, localRecentAlerts, statewideRecentAlerts]);


            if (error) {
                return (
                    <div className="flex items-center justify-center min-h-screen bg-red-50 p-4">
                        <div className="bg-white p-6 rounded shadow text-center max-w-md">
                            <h2 className="text-xl font-bold text-red-600 mb-2">Error</h2>
                            <p className="text-gray-700">{error}</p>
                            <button onClick={() => window.location.reload()} className="mt-4 px-4 py-2 bg-slate-800 text-white rounded hover:bg-slate-700">Retry</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="container mx-auto max-w-4xl p-4">
                    {/* Header */}
                    <header className="mb-6 border-b pb-4 border-slate-200">
                        <div className="flex justify-between items-end">
                            <div>
                                <h1 className="text-3xl font-extrabold text-slate-800">State Weather Monitor</h1>
                                {location.stateName ? (
                                    <p className="text-slate-500 mt-1">
                                        Location: <span className="font-semibold text-blue-600">{location.countyName ? `${location.countyName} County, ` : ''}{location.stateCode}</span>
                                    </p>
                                ) : (
                                     <p className="text-slate-400 mt-1 animate-pulse">Locating...</p>
                                )}
                            </div>
                            <div className="text-right hidden sm:block">
                                <span className="text-xs text-slate-400">Updated: {new Date().toLocaleTimeString()}</span>
                            </div>
                        </div>
                    </header>

                    {/* Map */}
                    <section className="mb-8">
                        <div id="map" ref={mapRef} className="shadow-inner border border-slate-300 relative">
                             {/* Map Legend Overlay */}
                             <div className="absolute top-2 right-2 bg-white/90 p-2 rounded shadow text-xs font-medium space-y-1 z-[1000]">
                                <div className="flex items-center gap-2"><span className="w-3 h-3 bg-red-700 rounded-full border border-red-800"></span> Local Active</div>
                                <div className="flex items-center gap-2"><span className="w-3 h-3 bg-red-500 rounded-full border border-red-600 opacity-70"></span> Statewide Active</div>
                                <div className="flex items-center gap-2"><span className="w-3 h-3 bg-gray-600 rounded-full border border-gray-700 opacity-60"></span> Local Recent</div>
                                <div className="flex items-center gap-2"><span className="w-3 h-3 bg-gray-400 rounded-full border border-gray-500 opacity-40"></span> Statewide Recent</div>
                            </div>
                        </div>
                    </section>

                    {/* Alerts Lists */}
                    {loading ? (
                        <div className="flex justify-center p-12">
                            <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
                        </div>
                    ) : (
                        <div className="space-y-6">
                            
                            {/* 1. Local Active */}
                            <CollapsibleSection 
                                title={`Local Active (${location.countyName})`} 
                                count={localActiveAlerts.length} 
                                isOpenDefault={true}
                                color="red"
                                icon={<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>}
                            >
                                {localActiveAlerts.map(alert => <AlertCard key={alert.id} alert={alert} type="active" />)}
                            </CollapsibleSection>

                            {/* 2. Local Recent */}
                            <CollapsibleSection 
                                title={`Local Recent (Past 7d)`} 
                                count={localRecentAlerts.length} 
                                isOpenDefault={true}
                                color="gray"
                                icon={<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>}
                            >
                                {localRecentAlerts.map(alert => <AlertCard key={alert.id} alert={alert} type="recent" />)}
                            </CollapsibleSection>

                            {/* 3. Statewide Active */}
                            <CollapsibleSection 
                                title="Statewide Active" 
                                count={statewideActiveAlerts.length} 
                                isOpenDefault={false}
                                color="slate"
                                icon={<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3v18h18"/><path d="M18.7 8l-5.1 5.2-2.8-2.7L7 14.3"/></svg>}
                            >
                                {statewideActiveAlerts.map(alert => <AlertCard key={alert.id} alert={alert} type="active" />)}
                            </CollapsibleSection>

                            {/* 4. Statewide Recent */}
                            <CollapsibleSection 
                                title="Statewide Recent (Past 7d)" 
                                count={statewideRecentAlerts.length} 
                                isOpenDefault={false}
                                color="slate"
                                icon={<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/></svg>}
                            >
                                {statewideRecentAlerts.map(alert => <AlertCard key={alert.id} alert={alert} type="recent" />)}
                            </CollapsibleSection>

                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
