<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyAlert | Weather Intelligence</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

    <!-- React, Babel, Axios -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-primary-container": "#00253f",
                        "tertiary-container": "#def0fc",
                        "on-primary": "#ecf3ff",
                        "surface-dim": "#d0d5d8",
                        "secondary-container": "#a4d8ff",
                        "primary-container": "#2aa7ff",
                        "surface-container-highest": "#d9dde0",
                        "primary-dim": "#005385",
                        "tertiary": "#4d5e68",
                        "outline-variant": "#abadaf",
                        "error": "#b31b25",
                        "secondary": "#00618d",
                        "on-background": "#2c2f31",
                        "surface-container-low": "#eef1f3",
                        "on-secondary-container": "#004c6f",
                        "surface-variant": "#d9dde0",
                        "surface-container": "#e5e9eb",
                        "on-surface-variant": "#595c5e",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed": "#2aa7ff",
                        "secondary-fixed": "#a4d8ff",
                        "on-surface": "#2c2f31",
                        "primary": "#005f98",
                        "surface-bright": "#f5f7f9",
                        "surface": "#f5f7f9",
                        "error-container": "#fb5151",
                        "on-error": "#ffefee",
                        "secondary-dim": "#00557b",
                        "on-secondary": "#e9f4ff",
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Manrope"],
                        "label": ["Inter"],
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        };
    </script>

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

    <style>
        body { min-height: max(884px, 100dvh); }
        #map { height: 100%; width: 100%; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        .leaflet-popup-content-wrapper { border-radius: 0.5rem; }
        .leaflet-container { font-family: Inter, sans-serif; }
    </style>
</head>
<body class="bg-surface font-body text-on-surface selection:bg-primary-container selection:text-on-primary-container min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const STATE_MAPPING = {
            "Alabama":"AL","Alaska":"AK","Arizona":"AZ","Arkansas":"AR","California":"CA",
            "Colorado":"CO","Connecticut":"CT","Delaware":"DE","Florida":"FL","Georgia":"GA",
            "Hawaii":"HI","Idaho":"ID","Illinois":"IL","Indiana":"IN","Iowa":"IA",
            "Kansas":"KS","Kentucky":"KY","Louisiana":"LA","Maine":"ME","Maryland":"MD",
            "Massachusetts":"MA","Michigan":"MI","Minnesota":"MN","Mississippi":"MS","Missouri":"MO",
            "Montana":"MT","Nebraska":"NE","Nevada":"NV","New Hampshire":"NH","New Jersey":"NJ",
            "New Mexico":"NM","New York":"NY","North Carolina":"NC","North Dakota":"ND","Ohio":"OH",
            "Oklahoma":"OK","Oregon":"OR","Pennsylvania":"PA","Rhode Island":"RI","South Carolina":"SC",
            "South Dakota":"SD","Tennessee":"TN","Texas":"TX","Utah":"UT","Vermont":"VT",
            "Virginia":"VA","Washington":"WA","West Virginia":"WV","Wisconsin":"WI","Wyoming":"WY",
            "District of Columbia":"DC","Puerto Rico":"PR"
        };

        const getAlertIcon = (event) => {
            const e = (event || "").toLowerCase();
            if (e.includes("flood")) return "water_drop";
            if (e.includes("tornado")) return "tornado";
            if (e.includes("wind") || e.includes("gale")) return "air";
            if (e.includes("snow") || e.includes("winter") || e.includes("ice") || e.includes("blizzard") || e.includes("freeze") || e.includes("frost")) return "weather_snowy";
            if (e.includes("heat")) return "thermostat";
            if (e.includes("thunder") || e.includes("storm") || e.includes("squall")) return "thunderstorm";
            if (e.includes("fire") || e.includes("red flag")) return "local_fire_department";
            if (e.includes("fog")) return "foggy";
            if (e.includes("hurricane") || e.includes("tropical")) return "cyclone";
            return "warning";
        };

        const getWeatherIcon = (code) => {
            if (code === 0) return "wb_sunny";
            if (code <= 3) return "partly_cloudy_day";
            if (code <= 48) return "foggy";
            if (code <= 67) return "rainy";
            if (code <= 77) return "weather_snowy";
            if (code <= 82) return "rainy";
            return "thunderstorm";
        };

        const getUVLabel = (uv) => {
            if (uv <= 2) return "Low";
            if (uv <= 5) return "Moderate";
            if (uv <= 7) return "High";
            if (uv <= 10) return "V. High";
            return "Extreme";
        };

        const timeAgo = (iso) => {
            const diff = Date.now() - new Date(iso).getTime();
            const m = Math.floor(diff / 60000);
            if (m < 60) return `${m}m ago`;
            const h = Math.floor(m / 60);
            if (h < 24) return `${h}h ago`;
            return `${Math.floor(h / 24)}d ago`;
        };

        const fmtTime = (iso) => new Date(iso).toLocaleString([], {
            weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
        });

        // ── Active Alert Card (prominent, glass panel) ────────────────────────
        const ActiveAlertCard = ({ alert }) => {
            const [expanded, setExpanded] = useState(false);
            const icon = getAlertIcon(alert.properties.event);
            return (
                <div className="glass-panel p-6 rounded-2xl hover:shadow-2xl transition-all duration-500 flex items-start gap-5 border-l-4 border-primary">
                    <div className="bg-primary/10 p-3 rounded-xl flex-shrink-0">
                        <span className="material-symbols-outlined text-primary text-2xl">{icon}</span>
                    </div>
                    <div className="flex-1 min-w-0">
                        <div className="flex justify-between items-start mb-1 gap-2">
                            <h4 className="text-base font-headline font-bold text-on-surface leading-tight">{alert.properties.event}</h4>
                            <span className="text-xs font-label text-on-surface-variant flex-shrink-0">{timeAgo(alert.properties.effective)}</span>
                        </div>
                        <p className="text-xs text-on-surface-variant font-label mb-2">{alert.properties.areaDesc}</p>
                        <p className="text-on-surface-variant text-sm leading-relaxed font-body" style={{display:'-webkit-box',WebkitLineClamp:expanded?'unset':2,WebkitBoxOrient:'vertical',overflow:'hidden'}}>
                            {alert.properties.headline || alert.properties.description || "No description available."}
                        </p>
                        <div className="flex gap-3 mt-4">
                            <button onClick={() => setExpanded(!expanded)}
                                className="px-4 py-2 bg-gradient-to-r from-primary to-primary-container text-white text-xs font-semibold rounded-full shadow-lg shadow-primary/20 hover:scale-105 transition-transform">
                                {expanded ? "Hide Details" : "View Details"}
                            </button>
                        </div>
                        {expanded && (
                            <div className="mt-3 space-y-1 text-xs text-on-surface-variant font-label">
                                <p><span className="font-semibold">Effective:</span> {fmtTime(alert.properties.effective)}</p>
                                <p><span className="font-semibold">Expires:</span> {fmtTime(alert.properties.expires)}</p>
                                <div className="mt-2 p-3 bg-black/5 rounded-lg border border-outline-variant/20 max-h-48 overflow-y-auto whitespace-pre-wrap">
                                    {alert.properties.description || "No description available."}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // ── Compact Alert Card (statewide / recent grid) ──────────────────────
        const CompactAlertCard = ({ alert }) => {
            const [expanded, setExpanded] = useState(false);
            const icon = getAlertIcon(alert.properties.event);
            return (
                <div className="bg-white/40 p-4 rounded-xl hover:bg-white/60 transition-colors cursor-pointer" onClick={() => setExpanded(!expanded)}>
                    <div className="flex items-center gap-3">
                        <div className="w-9 h-9 rounded-full bg-slate-200 flex items-center justify-center flex-shrink-0">
                            <span className="material-symbols-outlined text-slate-500 text-lg">{icon}</span>
                        </div>
                        <div className="flex-1 min-w-0">
                            <p className="text-sm font-bold truncate">{alert.properties.event}</p>
                            <p className="text-xs text-on-surface-variant truncate">
                                {alert.properties.areaDesc?.split(';')[0]?.trim()} • {timeAgo(alert.properties.effective)}
                            </p>
                        </div>
                        <span className="material-symbols-outlined text-slate-400 text-sm flex-shrink-0" style={{fontSize:'16px'}}>
                            {expanded ? 'expand_less' : 'expand_more'}
                        </span>
                    </div>
                    {expanded && (
                        <div className="mt-3 text-xs text-on-surface-variant font-label space-y-1 border-t border-outline-variant/10 pt-3">
                            <p><span className="font-semibold">Effective:</span> {fmtTime(alert.properties.effective)}</p>
                            <p><span className="font-semibold">Expires:</span> {fmtTime(alert.properties.expires)}</p>
                            {alert.properties.headline && <p className="mt-1">{alert.properties.headline}</p>}
                        </div>
                    )}
                </div>
            );
        };

        // ── Collapsible Section ────────────────────────────────────────────────
        const CollapsibleSection = ({ title, count, icon, defaultOpen = false, children }) => {
            const [open, setOpen] = useState(defaultOpen);
            return (
                <div className="bg-surface-container-low/40 rounded-3xl overflow-hidden">
                    <button onClick={() => setOpen(!open)}
                        className="w-full px-8 py-5 flex items-center justify-between text-left hover:bg-white/30 transition-colors">
                        <span className="text-base font-headline font-bold flex items-center gap-2">
                            <span className="material-symbols-outlined text-slate-400" style={{fontSize:'20px'}}>{icon}</span>
                            {title}
                            <span className="ml-1 text-xs px-2 py-0.5 bg-white/50 rounded-full text-on-surface-variant font-label">{count}</span>
                        </span>
                        <span className={`material-symbols-outlined text-slate-400 transition-transform duration-300 ${open ? 'rotate-180' : ''}`}>expand_more</span>
                    </button>
                    {open && (
                        <div className="px-8 pb-6 border-t border-outline-variant/10">
                            {count > 0 ? (
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 mt-4">
                                    {children}
                                </div>
                            ) : (
                                <p className="text-sm italic text-on-surface-variant mt-4 font-label">No alerts in this category.</p>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        // ── Active Alerts Section (collapsible, open by default) ─────────────
        const ActiveAlertsSection = ({ title, count, accentColor = 'primary', loading, emptyMessage, children }) => {
            const [open, setOpen] = useState(true);
            const accentBar = accentColor === 'primary' ? 'bg-primary' : 'bg-slate-400';
            const badgeClass = accentColor === 'primary'
                ? 'bg-primary-container/20 text-primary'
                : 'bg-slate-200 text-slate-600';
            return (
                <div>
                    <button onClick={() => setOpen(o => !o)}
                        className="w-full flex items-center justify-between gap-3 py-2 hover:opacity-75 transition-opacity text-left">
                        <h3 className="text-xl font-headline font-bold flex items-center gap-2 min-w-0">
                            <span className={`w-1.5 h-6 ${accentBar} rounded-full flex-shrink-0`}></span>
                            <span className="min-w-0">{title}</span>
                        </h3>
                        <div className="flex items-center gap-2 flex-shrink-0">
                            {!loading && count > 0 && (
                                <span className={`px-3 py-1 ${badgeClass} text-xs font-bold rounded-full font-label whitespace-nowrap`}>
                                    {count} ACTIVE
                                </span>
                            )}
                            <span className={`material-symbols-outlined text-slate-400 transition-transform duration-300 ${open ? 'rotate-180' : ''}`}>expand_more</span>
                        </div>
                    </button>
                    {open && (
                        <div className="mt-6">
                            {loading ? (
                                <div className="glass-panel p-8 rounded-2xl flex items-center gap-4">
                                    <div className="animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-primary flex-shrink-0"></div>
                                    <p className="text-on-surface-variant text-sm font-label">Accessing NWS database…</p>
                                </div>
                            ) : count > 0 ? children : (
                                <div className="glass-panel p-6 rounded-2xl flex items-center gap-4 text-on-surface-variant">
                                    <span className="material-symbols-outlined text-2xl text-emerald-400">check_circle</span>
                                    <p className="text-sm font-label">{emptyMessage}</p>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        // ── Main App ──────────────────────────────────────────────────────────
        const App = () => {
            const [location, setLocation] = useState({ lat: null, lon: null, stateCode: null, stateName: null, countyName: null });
            const [alertsLoading, setAlertsLoading] = useState(true);
            const [error, setError] = useState(null);
            const [localActiveAlerts, setLocalActiveAlerts] = useState([]);
            const [statewideActiveAlerts, setStatewideActiveAlerts] = useState([]);
            const [localRecentAlerts, setLocalRecentAlerts] = useState([]);
            const [statewideRecentAlerts, setStatewideRecentAlerts] = useState([]);
            const [weather, setWeather] = useState(null);
            const [forecast, setForecast] = useState([]);
            const [searchOpen, setSearchOpen] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');
            const [searchResults, setSearchResults] = useState([]);
            const [searchLoading, setSearchLoading] = useState(false);

            const mapRef = useRef(null);
            const mapInstanceRef = useRef(null);
            const layerGroupRef = useRef(null);
            const userMarkerRef = useRef(null);
            const searchInputRef = useRef(null);

            const categorizeAlerts = (alerts, countyName) => {
                let local = [], statewide = [];
                if (countyName) {
                    const uc = countyName.toLowerCase();
                    alerts.forEach(alert => {
                        const areas = (alert.properties.areaDesc || "").toLowerCase().split(';').map(s => s.trim());
                        if (areas.some(a => a === uc || a.includes(uc))) local.push(alert);
                        else statewide.push(alert);
                    });
                } else {
                    statewide = alerts;
                }
                return { local, statewide };
            };

            // Shared: reverse-geocode coords and load all data for that location
            const loadFromCoords = async (latitude, longitude) => {
                try {
                    const geoRes = await axios.get(`https://nominatim.openstreetmap.org/reverse`, {
                        params: { format: 'json', lat: latitude, lon: longitude }
                    });
                    const address = geoRes.data.address;
                    const stateName = address.state;
                    const stateCode = STATE_MAPPING[stateName];
                    const countyName = (address.county || "").replace(/\s+(County|Parish|Borough)$/i, "");
                    if (!stateCode) throw new Error(`Unknown state: ${stateName}`);
                    setAlertsLoading(true);
                    setWeather(null);
                    setForecast([]);
                    setLocation({ lat: latitude, lon: longitude, stateCode, stateName, countyName });
                } catch (err) {
                    setError("Failed to determine location. " + err.message);
                    setAlertsLoading(false);
                }
            };

            // 1. Geolocation + reverse geocode
            useEffect(() => {
                if (!navigator.geolocation) {
                    setError("Geolocation is not supported by your browser.");
                    setAlertsLoading(false);
                    return;
                }
                navigator.geolocation.getCurrentPosition(
                    (pos) => loadFromCoords(pos.coords.latitude, pos.coords.longitude),
                    () => {
                        setError("Location access denied. Please allow location access and reload.");
                        setAlertsLoading(false);
                    }
                );
            }, []);

            // Search: debounced Nominatim query
            useEffect(() => {
                if (!searchQuery.trim()) { setSearchResults([]); setSearchLoading(false); return; }
                setSearchLoading(true);
                const timer = setTimeout(async () => {
                    try {
                        const res = await axios.get(`https://nominatim.openstreetmap.org/search`, {
                            params: { q: searchQuery, format: 'json', addressdetails: 1, limit: 6, countrycodes: 'us' }
                        });
                        setSearchResults(res.data);
                    } catch {
                        setSearchResults([]);
                    } finally {
                        setSearchLoading(false);
                    }
                }, 400);
                return () => clearTimeout(timer);
            }, [searchQuery]);

            // Focus input when search opens; clear when it closes
            useEffect(() => {
                if (searchOpen) setTimeout(() => searchInputRef.current?.focus(), 50);
                else { setSearchQuery(''); setSearchResults([]); }
            }, [searchOpen]);

            // 2. NWS Alerts
            useEffect(() => {
                if (!location.stateCode) return;
                const fetchAlerts = async () => {
                    try {
                        const startTime = new Date(Date.now() - 6 * 24 * 60 * 60 * 1000).toISOString().split('.')[0] + "Z";
                        const [activeRes, historyRes] = await Promise.all([
                            axios.get(`https://api.weather.gov/alerts/active`, {
                                headers: { Accept: 'application/geo+json' },
                                params: { area: location.stateCode }
                            }),
                            axios.get(`https://api.weather.gov/alerts`, {
                                headers: { Accept: 'application/geo+json' },
                                params: { area: location.stateCode, start: startTime, limit: 200 }
                            })
                        ]);
                        const active = activeRes.data.features || [];
                        const history = historyRes.data.features || [];
                        const activeIds = new Set(active.map(a => a.id));
                        const recent = history.filter(a => !activeIds.has(a.id));
                        const ca = categorizeAlerts(active, location.countyName);
                        const cr = categorizeAlerts(recent, location.countyName);
                        setLocalActiveAlerts(ca.local);
                        setStatewideActiveAlerts(ca.statewide);
                        setLocalRecentAlerts(cr.local);
                        setStatewideRecentAlerts(cr.statewide);
                        setAlertsLoading(false);
                    } catch (err) {
                        let msg = "Failed to fetch weather alerts.";
                        if (err.response?.data?.detail) msg += `: ${err.response.data.detail}`;
                        else if (err.response?.data?.title) msg += `: ${err.response.data.title}`;
                        else msg += ` ${err.message}`;
                        setError(msg);
                        setAlertsLoading(false);
                    }
                };
                fetchAlerts();
            }, [location.stateCode, location.countyName]);

            // 3. Open-Meteo current weather + 48h forecast
            useEffect(() => {
                if (!location.lat) return;
                const fetchWeather = async () => {
                    try {
                        const res = await axios.get(`https://api.open-meteo.com/v1/forecast`, {
                            params: {
                                latitude: location.lat,
                                longitude: location.lon,
                                current: "temperature_2m,apparent_temperature,relative_humidity_2m,surface_pressure,uv_index,visibility,weather_code,wind_speed_10m",
                                hourly: "temperature_2m",
                                temperature_unit: "fahrenheit",
                                wind_speed_unit: "mph",
                                forecast_days: 3,
                                timezone: "auto"
                            }
                        });
                        setWeather(res.data.current);
                        // Build per-day high/low for next 2 days
                        const { time: times, temperature_2m: temps } = res.data.hourly;
                        const today = new Date().toISOString().split('T')[0];
                        const dayMap = {};
                        times.forEach((t, i) => {
                            const d = t.split('T')[0];
                            if (d <= today) return;
                            if (!dayMap[d]) dayMap[d] = [];
                            dayMap[d].push(temps[i]);
                        });
                        const days = Object.keys(dayMap).sort().slice(0, 2);
                        setForecast(days.map(d => ({
                            label: new Date(d + 'T12:00:00').toLocaleDateString([], { weekday: 'short' }),
                            high: Math.round(Math.max(...dayMap[d])),
                            low: Math.round(Math.min(...dayMap[d])),
                        })));
                    } catch (err) {
                        console.error("Open-Meteo fetch failed:", err);
                    }
                };
                fetchWeather();
            }, [location.lat, location.lon]);

            // 4. Init Leaflet map
            useEffect(() => {
                if (!location.lat || !mapRef.current || mapInstanceRef.current) return;
                mapInstanceRef.current = L.map(mapRef.current, { zoomControl: false })
                    .setView([location.lat, location.lon], 8);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>'
                }).addTo(mapInstanceRef.current);
                L.control.zoom({ position: 'topright' }).addTo(mapInstanceRef.current);
                const markerHtml = `<div style="width:14px;height:14px;background:#2aa7ff;border-radius:50%;border:3px solid white;box-shadow:0 0 15px rgba(42,167,255,0.7);"></div>`;
                const icon = L.divIcon({ html: markerHtml, className: '', iconSize: [14, 14], iconAnchor: [7, 7] });
                userMarkerRef.current = L.marker([location.lat, location.lon], { icon })
                    .addTo(mapInstanceRef.current).bindPopup("You are here").openPopup();
                layerGroupRef.current = L.layerGroup().addTo(mapInstanceRef.current);
            }, [location.lat]);

            // 4b. Pan map and reposition marker when location changes (e.g. after search)
            useEffect(() => {
                if (!mapInstanceRef.current || !location.lat) return;
                mapInstanceRef.current.setView([location.lat, location.lon], 8);
                if (userMarkerRef.current) {
                    userMarkerRef.current.setLatLng([location.lat, location.lon]);
                }
            }, [location.lat, location.lon]);

            // 5. Draw alert polygons
            useEffect(() => {
                if (!mapInstanceRef.current || !layerGroupRef.current) return;
                layerGroupRef.current.clearLayers();
                const add = (alerts, color, weight) => alerts.forEach(alert => {
                    if (alert.geometry) {
                        L.geoJSON(alert.geometry, {
                            style: { color, weight, opacity: 0.8, fillOpacity: 0.1 },
                            onEachFeature: (f, layer) => layer.bindPopup(`<b>${alert.properties.event}</b><br>${alert.properties.headline || ''}`)
                        }).addTo(layerGroupRef.current);
                    }
                });
                add(statewideRecentAlerts, '#94a3b8', 1);
                add(localRecentAlerts, '#64748b', 2);
                add(statewideActiveAlerts, '#0099f0', 2);
                add(localActiveAlerts, '#005f98', 4);
            }, [localActiveAlerts, statewideActiveAlerts, localRecentAlerts, statewideRecentAlerts]);

            const totalActive = localActiveAlerts.length + statewideActiveAlerts.length;

            if (error) {
                return (
                    <div className="flex items-center justify-center min-h-screen p-4">
                        <div className="glass-panel border border-red-200 p-8 rounded-2xl shadow-2xl text-center max-w-md">
                            <span className="material-symbols-outlined text-error text-5xl mb-3 block">error</span>
                            <h2 className="text-xl font-headline font-bold text-on-surface mb-3">Unable to Load</h2>
                            <p className="text-on-surface-variant mb-6 font-label text-sm">{error}</p>
                            <button onClick={() => window.location.reload()}
                                className="px-6 py-2.5 bg-primary text-white rounded-full font-semibold hover:bg-primary-dim transition-all">
                                Retry
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <>
                    {/* ── Header ── */}
                    <header className="fixed top-0 w-full z-50 bg-white/70 backdrop-blur-xl shadow-2xl shadow-slate-900/5">
                        <div className="flex justify-between items-center px-8 h-20 max-w-7xl mx-auto">
                            <div className="flex items-center gap-3">
                                <span className="material-symbols-outlined text-sky-500 text-3xl">cloud_queue</span>
                                <h1 className="text-2xl font-extrabold text-slate-900 font-headline tracking-tight">SkyAlert</h1>
                            </div>
                            <nav className="hidden md:flex items-center gap-8">
                                <a className="text-sky-600 border-b-2 border-sky-500 pb-1 font-headline font-semibold" href="#">Overview</a>
                                <a className="text-slate-500 font-medium hover:text-sky-500 transition-colors duration-300 font-label" href="#">Details</a>
                                <a className="text-slate-500 font-medium hover:text-sky-500 transition-colors duration-300 font-label" href="#">Archive</a>
                            </nav>
                            <div className="flex items-center gap-1">
                                <button
                                    title="Use my location"
                                    onClick={() => {
                                        setSearchOpen(false);
                                        if (navigator.geolocation) {
                                            navigator.geolocation.getCurrentPosition(
                                                pos => loadFromCoords(pos.coords.latitude, pos.coords.longitude),
                                                () => {}
                                            );
                                        }
                                    }}
                                    className="p-2 rounded-full hover:bg-surface-container-low transition-colors active:scale-90">
                                    <span className="material-symbols-outlined text-slate-600">my_location</span>
                                </button>
                                <button
                                    onClick={() => setSearchOpen(o => !o)}
                                    className={`p-2 rounded-full transition-colors active:scale-90 ${searchOpen ? 'bg-primary/10' : 'hover:bg-surface-container-low'}`}>
                                    <span className={`material-symbols-outlined ${searchOpen ? 'text-primary' : 'text-slate-600'}`}>
                                        {searchOpen ? 'close' : 'search'}
                                    </span>
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* ── Search Overlay ── */}
                    {searchOpen && (
                        <div className="fixed top-20 inset-x-0 z-40 bg-white/95 backdrop-blur-xl border-b border-outline-variant/20 shadow-2xl shadow-slate-900/10">
                            <div className="max-w-2xl mx-auto px-6 py-5">
                                {/* Input */}
                                <div className="flex items-center gap-3 bg-surface-container-low rounded-2xl px-4 py-3 border border-outline-variant/30 focus-within:border-primary/50 focus-within:ring-2 focus-within:ring-primary/10 transition-all">
                                    <span className="material-symbols-outlined text-slate-400 flex-shrink-0">search</span>
                                    <input
                                        ref={searchInputRef}
                                        type="text"
                                        value={searchQuery}
                                        onChange={e => setSearchQuery(e.target.value)}
                                        onKeyDown={e => e.key === 'Escape' && setSearchOpen(false)}
                                        placeholder="Search city, county, or zip code…"
                                        className="flex-1 bg-transparent outline-none text-on-surface font-label text-sm placeholder:text-slate-400"
                                    />
                                    {searchLoading && (
                                        <div className="animate-spin rounded-full h-4 w-4 border-t-2 border-primary flex-shrink-0"></div>
                                    )}
                                    {searchQuery && !searchLoading && (
                                        <button onClick={() => setSearchQuery('')} className="text-slate-400 hover:text-on-surface transition-colors flex-shrink-0">
                                            <span className="material-symbols-outlined" style={{fontSize:'18px'}}>close</span>
                                        </button>
                                    )}
                                </div>

                                {/* Results dropdown */}
                                {searchQuery && !searchLoading && (
                                    <div className="mt-2 bg-white rounded-2xl border border-outline-variant/20 shadow-xl overflow-hidden">
                                        {searchResults.length === 0 ? (
                                            <p className="px-4 py-3 text-sm text-on-surface-variant font-label italic">
                                                No US locations found for "{searchQuery}"
                                            </p>
                                        ) : searchResults.map((r, i) => {
                                            const city = r.address?.city || r.address?.town || r.address?.village || r.address?.county || '';
                                            const state = r.address?.state || '';
                                            const label = city ? `${city}, ${state}` : r.display_name.split(',').slice(0, 2).join(',');
                                            return (
                                                <button key={i}
                                                    onClick={async () => {
                                                        setSearchOpen(false);
                                                        await loadFromCoords(parseFloat(r.lat), parseFloat(r.lon));
                                                    }}
                                                    className="w-full flex items-center gap-3 px-4 py-3 hover:bg-surface-container-low transition-colors text-left border-b border-outline-variant/10 last:border-0">
                                                    <span className="material-symbols-outlined text-slate-400 flex-shrink-0" style={{fontSize:'18px'}}>location_on</span>
                                                    <div className="min-w-0">
                                                        <p className="text-sm font-semibold text-on-surface font-label">{label}</p>
                                                        <p className="text-xs text-on-surface-variant truncate">{r.display_name}</p>
                                                    </div>
                                                </button>
                                            );
                                        })}
                                    </div>
                                )}

                                {/* Use my location shortcut (shown when input is empty) */}
                                {!searchQuery && (
                                    <button
                                        onClick={() => {
                                            setSearchOpen(false);
                                            if (navigator.geolocation) {
                                                navigator.geolocation.getCurrentPosition(
                                                    pos => loadFromCoords(pos.coords.latitude, pos.coords.longitude),
                                                    () => {}
                                                );
                                            }
                                        }}
                                        className="mt-3 flex items-center gap-2 text-sm text-primary font-label font-semibold hover:underline">
                                        <span className="material-symbols-outlined" style={{fontSize:'18px'}}>my_location</span>
                                        Use my current location
                                    </button>
                                )}
                            </div>
                        </div>
                    )}

                    <main className="pt-20">
                        {/* ── Hero Map ── */}
                        <section className="relative w-full h-[442px] min-h-[400px] overflow-hidden bg-slate-200">
                            <div className="absolute inset-0 z-0" ref={mapRef} id="map"></div>

                            {/* Location card */}
                            <div className="absolute bottom-8 left-8 z-20">
                                <div className="glass-panel p-5 rounded-xl shadow-xl max-w-xs">
                                    {location.countyName ? (
                                        <>
                                            <h2 className="text-2xl font-headline font-extrabold text-on-surface mb-0.5">
                                                {location.countyName} County
                                            </h2>
                                            <p className="text-sm text-on-surface-variant font-label">
                                                {location.stateName}, US &bull; {location.lat?.toFixed(4)}° N, {Math.abs(location.lon)?.toFixed(4)}° W
                                            </p>
                                        </>
                                    ) : (
                                        <p className="text-sm text-on-surface-variant font-label animate-pulse">Detecting location…</p>
                                    )}
                                </div>
                            </div>

                            {/* Active alert badge */}
                            {totalActive > 0 && (
                                <div className="absolute top-6 left-8 z-20">
                                    <div className="glass-panel px-4 py-2 rounded-full shadow-lg flex items-center gap-2">
                                        <span className="w-2 h-2 bg-error rounded-full animate-pulse"></span>
                                        <span className="text-sm font-bold text-error font-label">
                                            {totalActive} Active Alert{totalActive > 1 ? 's' : ''}
                                        </span>
                                    </div>
                                </div>
                            )}

                            {/* Legend */}
                            <div className="absolute bottom-8 right-8 z-20 glass-panel px-4 py-3 rounded-xl text-xs font-label font-bold space-y-1.5 text-on-surface-variant hidden sm:block">
                                <div className="flex items-center gap-2"><span className="w-3 h-3 rounded-full bg-[#005f98]"></span>Local Active</div>
                                <div className="flex items-center gap-2"><span className="w-3 h-3 rounded-full bg-[#0099f0]"></span>State Active</div>
                                <div className="flex items-center gap-2"><span className="w-3 h-3 rounded-full bg-[#94a3b8]"></span>Recent</div>
                            </div>
                        </section>

                        {/* ── Bento Grid ── */}
                        <div className="max-w-7xl mx-auto px-8 py-16">
                            <div className="grid grid-cols-1 md:grid-cols-12 gap-8">

                                {/* ── Main Alerts Column ── */}
                                <div className="md:col-span-8 space-y-12">

                                    {/* County Active Alerts */}
                                    <ActiveAlertsSection
                                        title={location.countyName ? `${location.countyName} County Alerts` : 'County Alerts'}
                                        count={localActiveAlerts.length}
                                        accentColor="primary"
                                        loading={alertsLoading}
                                        emptyMessage="No current alerts for your county."
                                    >
                                        <div className="space-y-4">
                                            {localActiveAlerts.map(a => <ActiveAlertCard key={a.id} alert={a} />)}
                                        </div>
                                    </ActiveAlertsSection>

                                    {/* Statewide Active Alerts */}
                                    <ActiveAlertsSection
                                        title={location.stateName ? `${location.stateName} State Alerts` : 'State Alerts'}
                                        count={statewideActiveAlerts.length}
                                        accentColor="slate"
                                        loading={alertsLoading}
                                        emptyMessage="No active statewide alerts."
                                    >
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                            {statewideActiveAlerts.map(a => <CompactAlertCard key={a.id} alert={a} />)}
                                        </div>
                                    </ActiveAlertsSection>

                                    {/* Past 7 Days (collapsible) */}
                                    <div className="space-y-4">
                                        <h3 className="text-xl font-headline font-bold flex items-center gap-2">
                                            <span className="w-1.5 h-6 bg-slate-300 rounded-full"></span>
                                            Recent Activity — Past 7 Days
                                        </h3>
                                        <CollapsibleSection
                                            title="Local Recent"
                                            count={localRecentAlerts.length}
                                            icon="location_on"
                                            defaultOpen={true}
                                        >
                                            {localRecentAlerts.map(a => <CompactAlertCard key={a.id} alert={a} />)}
                                        </CollapsibleSection>
                                        <CollapsibleSection
                                            title="Statewide Recent"
                                            count={statewideRecentAlerts.length}
                                            icon="map"
                                            defaultOpen={false}
                                        >
                                            {statewideRecentAlerts.map(a => <CompactAlertCard key={a.id} alert={a} />)}
                                        </CollapsibleSection>
                                    </div>
                                </div>

                                {/* ── Sidebar ── */}
                                <div className="md:col-span-4 space-y-8">

                                    {/* Atmospheric Status */}
                                    <div className="glass-panel p-8 rounded-3xl shadow-xl shadow-slate-900/5 overflow-hidden relative">
                                        <div className="absolute top-0 right-0 w-32 h-32 bg-primary/5 rounded-full -mr-16 -mt-16 blur-3xl pointer-events-none"></div>
                                        <h4 className="text-xs font-label font-bold text-primary uppercase tracking-widest mb-6">Weather Status</h4>
                                        {weather ? (
                                            <div className="space-y-6">
                                                <div className="flex justify-between items-end">
                                                    <div>
                                                        <p className="text-slate-500 text-xs font-label mb-1">Current Temperature</p>
                                                        <p className="text-5xl font-headline font-extrabold text-on-surface">{Math.round(weather.temperature_2m)}°</p>
                                                        <p className="text-xs text-on-surface-variant font-label mt-1">Feels like {Math.round(weather.apparent_temperature)}°</p>
                                                    </div>
                                                    <span className="material-symbols-outlined text-sky-400 text-4xl mb-1" style={{fontVariationSettings:"'FILL' 1"}}>
                                                        {getWeatherIcon(weather.weather_code)}
                                                    </span>
                                                </div>
                                                <div className="pt-6 border-t border-outline-variant/10 grid grid-cols-2 gap-4">
                                                    <div>
                                                        <p className="text-slate-500 text-[10px] font-bold uppercase tracking-tighter font-label">Humidity</p>
                                                        <p className="text-lg font-headline font-bold">{weather.relative_humidity_2m}%</p>
                                                    </div>
                                                    <div>
                                                        <p className="text-slate-500 text-[10px] font-bold uppercase tracking-tighter font-label">UV Index</p>
                                                        <p className="text-lg font-headline font-bold">{getUVLabel(weather.uv_index)} {Math.round(weather.uv_index)}</p>
                                                    </div>
                                                    <div>
                                                        <p className="text-slate-500 text-[10px] font-bold uppercase tracking-tighter font-label">Pressure</p>
                                                        <p className="text-lg font-headline font-bold">{Math.round(weather.surface_pressure)} hPa</p>
                                                    </div>
                                                    <div>
                                                        <p className="text-slate-500 text-[10px] font-bold uppercase tracking-tighter font-label">Wind</p>
                                                        <p className="text-lg font-headline font-bold">{Math.round(weather.wind_speed_10m)} mph</p>
                                                    </div>
                                                </div>
                                            </div>
                                        ) : (
                                            <div className="flex items-center gap-3 text-on-surface-variant">
                                                <div className="animate-spin rounded-full h-6 w-6 border-t-2 border-b-2 border-primary flex-shrink-0"></div>
                                                <p className="text-sm font-label">Loading weather…</p>
                                            </div>
                                        )}
                                    </div>

                                    {/* 48-Hour Outlook */}
                                    {forecast.length > 0 && (
                                        <div className="glass-panel p-8 rounded-3xl">
                                            <h4 className="text-sm font-headline font-bold mb-6">48-Hour Outlook</h4>
                                            <div className="space-y-3">
                                                {forecast.map((day, i) => (
                                                    <div key={i} className="flex items-center justify-between p-3 rounded-xl hover:bg-white/50 transition-colors">
                                                        <span className="font-label text-sm font-medium w-12">{day.label}</span>
                                                        <span className="material-symbols-outlined text-sky-400" style={{fontVariationSettings:"'FILL' 1"}}>partly_cloudy_day</span>
                                                        <span className="font-headline font-bold text-sm">
                                                            {day.high}° <span className="text-slate-400 font-normal">/ {day.low}°</span>
                                                        </span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {/* Alert Summary */}
                                    <div className="glass-panel p-6 rounded-2xl">
                                        <h4 className="text-xs font-label font-bold text-on-surface-variant uppercase tracking-widest mb-4">Alert Summary</h4>
                                        <div className="space-y-3">
                                            {[
                                                { label: "County Active", value: localActiveAlerts.length },
                                                { label: "Statewide Active", value: statewideActiveAlerts.length },
                                                { label: "Local (Past 7d)", value: localRecentAlerts.length },
                                                { label: "Statewide (Past 7d)", value: statewideRecentAlerts.length },
                                            ].map(({ label, value }) => (
                                                <div key={label} className="flex justify-between items-center">
                                                    <span className="text-sm font-label text-on-surface-variant">{label}</span>
                                                    <span className="font-headline font-bold text-on-surface">{value}</span>
                                                </div>
                                            ))}
                                        </div>
                                        <p className="text-[10px] text-on-surface-variant font-label mt-4 pt-3 border-t border-outline-variant/10">
                                            {new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })} &bull; NWS + Open-Meteo
                                        </p>
                                    </div>
                                </div>

                            </div>
                        </div>
                    </main>

                    {/* ── Footer ── */}
                    <footer className="w-full py-12 px-8 bg-slate-50/50 border-t border-outline-variant/10">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center space-y-4 md:space-y-0">
                            <div className="flex items-center gap-2">
                                <span className="material-symbols-outlined text-sky-500">cloud_queue</span>
                                <span className="font-headline font-bold text-slate-700">SkyAlert Atmospheric Systems</span>
                            </div>
                            <p className="text-xs text-on-surface-variant font-label">
                                Alert data: <a href="https://www.weather.gov" className="hover:text-primary transition-colors">NWS API</a> &bull; Weather: <a href="https://open-meteo.com" className="hover:text-primary transition-colors">Open-Meteo</a> &bull; Geocoding: Nominatim
                            </p>
                        </div>
                    </footer>
                </>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
